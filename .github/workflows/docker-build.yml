name: Local Container Health Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-endpoint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository source code
        uses: actions/checkout@v4

      - name: Build local Docker image from Dockerfile
        run: |
          echo "Compiling TypeScript and building multi-stage container..."
          docker build -t local-app:test .

      - name: Start container in background
        run: |
          echo "Spinning up container and exposing port 3000..."
          docker run -d --name app-container -p 3000:3000 local-app:test

      - name: Hit endpoint and output result to terminal
        run: |
          echo "Polling http://localhost:3000/health until application answers..."
          
          attempt=0
          until $(curl --output /dev/null --silent --head --fail http://localhost:3000/health); do
            if [ $attempt -gt 5 ]; then
              echo "❌ Error: The application health check timed out or crashed."
              echo "=== CONTAINER LOGS ==="
              docker logs app-container
              exit 1
            fi
            echo "Container application warming up... retrying in 2 seconds..."
            sleep 2
            attempt=$((attempt+1))
          done

          echo "=================================================="
          echo "🎉 SUCCESS: Endpoint responded perfectly!"
          echo "=================================================="
          echo "Response HTTP Status Code: $(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)"
          echo "Response JSON Payload:"
          curl -s http://localhost:3000/health
          echo ""
          echo "=================================================="

      - name: Cleanup container resource handles
        if: always()
        run: |
          echo "Stopping and deleting local runner test container..."
          docker rm -f app-container
