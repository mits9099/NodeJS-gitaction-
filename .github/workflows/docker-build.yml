name: Simple Health Check

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t my-app .

      - name: Run container
        run: docker run -d --name app-container -p 3000:3000 my-app

      - name: Wait and Test Endpoint
        run: |
          # Give Node exactly 3 seconds to boot up
          sleep 3
          
          echo "=== Fetching Health Check Result ==="
          # Run curl inside the container itself to bypass host network bugs
          docker exec app-container curl -s http://127.0.0.1:3000/health
      - name: Cleanup container resource handles
        if: always()
        run: |
          echo "Stopping and deleting local runner test container..."
          docker rm -f app-container
